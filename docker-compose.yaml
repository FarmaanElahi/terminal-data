x-terminal-env: &terminal-env
  # Auto-generated by Coolify (magic variables)
  DB_USER: ${SERVICE_USER_POSTGRES}
  DB_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
  SECRET_KEY: ${SERVICE_PASSWORD_64_SECRETKEY}
  BASE_URL: ${SERVICE_URL_APP}

  # Required
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:?}

  # Required - deployment will fail if not set
  OCI_BUCKET: ${OCI_BUCKET:?}
  OCI_CONFIG: ${OCI_CONFIG:?}
  OCI_KEY: ${OCI_KEY:?}

  # Required with defaults - prefilled in UI but can be changed
  DB_SCHEME: ${DB_SCHEME:?postgresql}
  DB_DRIVER: ${DB_DRIVER:?psycopg}
  DB_HOST: ${DB_HOST:?postgresql}
  DB_PORT: ${DB_PORT:?5432}
  DB_NAME: ${DB_NAME:?terminal}
  ENVIRONMENT: ${ENVIRONMENT:?production}
  LOG_LEVEL: ${LOG_LEVEL:?INFO}
  LOG_FORMAT: ${LOG_FORMAT:?json}
  PORT: ${PORT:?6698}
  ALGORITHM: ${ALGORITHM:?HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:?1440}
  MIN_PASSWORD_LENGTH: ${MIN_PASSWORD_LENGTH:?8}

  # Required - broker integrations
  UPSTOX_API_KEY: ${UPSTOX_API_KEY:?}
  UPSTOX_API_SECRET: ${UPSTOX_API_SECRET:?}
  KITE_API_KEY: ${KITE_API_KEY:?}
  KITE_API_SECRET: ${KITE_API_SECRET:?}
  UPSTOX_REDIRECT_URI: $SERVICE_URL_APP/broker/upstox/callback
  KITE_REDIRECT_URI: $SERVICE_URL_APP/broker/kite/callback

  # Optional - notifications
  VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
  VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
  VAPID_CLAIMS_EMAIL: ${VAPID_CLAIMS_EMAIL}

services:
  postgresql:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SERVICE_USER_POSTGRES}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: ${DB_NAME:?terminal}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DB_NAME:?terminal}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - terminal_pg:/var/lib/postgresql
    labels:
      - coolify.managed=true

  terminal:
    image: devfarmaan/terminal:main
    depends_on:
      - postgresql
    environment:
      <<: *terminal-env
      # Tells Coolify to proxy this service's URL to port 8000
      SERVICE_URL_APP_8000:
    volumes:
      - terminal_data:/app/data
    ports:
      - "${PORT}:${PORT}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${PORT:?8000}/health > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - coolify.managed=true

volumes:
  terminal_data:
    name: terminal_data
  terminal_pg:
    name: terminal_pg
