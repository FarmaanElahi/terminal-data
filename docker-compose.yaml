name: terminal

x-terminal-env: &terminal-env
  DB_SCHEME: ${DB_SCHEME:-postgresql}
  DB_DRIVER: ${DB_DRIVER:-psycopg}
  DB_HOST: db
  DB_PORT: 5432
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-postgres}
  DB_NAME: ${DB_NAME:-terminal}
  ALERT_WEBOOK_URL: ${ALERT_WEBOOK_URL:-}
  SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY}
  ENVIRONMENT: ${ENVIRONMENT:-production}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: ${LOG_FORMAT:-json}
  PORT: ${PORT:-8000}

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-terminal}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-terminal}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data_internal:/var/lib/postgresql/data

  configurator:
    image: devfarmaan/terminal:main
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      <<: *terminal-env
    command: ["/app/.venv/bin/python", "-m", "terminal.cli", "database", "upgrade", "head"]
    restart: "no"

  app:
    image: devfarmaan/terminal:main
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
      configurator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      <<: *terminal-env
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - terminal_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, os; port=os.getenv('PORT', '8000'); urllib.request.urlopen(f'http://localhost:{port}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  terminal_data:
  postgres_data_internal:
