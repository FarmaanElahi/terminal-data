name: terminal

x-terminal-env: &terminal-env
  DB_SCHEME: ${DB_SCHEME:-postgresql}
  DB_DRIVER: ${DB_DRIVER:-psycopg}
  DB_HOST: ${DB_HOST:?Set DB_HOST to your external Postgres host}
  DB_PORT: ${DB_PORT:-5432}
  DB_USER: ${DB_USER:?Set DB_USER}
  DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
  DB_NAME: ${DB_NAME:?Set DB_NAME}
  ALERT_WEBOOK_URL: ${ALERT_WEBOOK_URL:-}
  SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY}
  ENVIRONMENT: ${ENVIRONMENT:-production}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: ${LOG_FORMAT:-json}
  PORT: ${PORT:-8000}

services:
  configurator:
    image: devfarmaan/terminal:main
    pull_policy: always
    entrypoint: ["sh", "-c"]
    env_file:
      - .env
    environment:
      <<: *terminal-env
    command: >
      attempts="$${MIGRATION_ATTEMPTS:-60}";
      delay="$${MIGRATION_DELAY_SECONDS:-2}";
      i=1;
      while [ "$$i" -le "$$attempts" ]; do
        echo "[configurator] Running migrations (attempt $$i/$$attempts)...";
        if python -m terminal.cli database upgrade head; then
          echo "[configurator] Migrations applied.";
          exit 0;
        fi;
        echo "[configurator] Migration attempt $$i/$$attempts failed; retrying in $$delay s...";
        i=$$((i+1));
        sleep "$$delay";
      done;
      echo "[configurator] Failed to apply migrations after $$attempts attempts.";
      exit 1
    restart: "no"

  app:
    image: devfarmaan/terminal:main
    pull_policy: always
    depends_on:
      configurator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      <<: *terminal-env
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - terminal_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, os; port=os.getenv('PORT', '8000'); urllib.request.urlopen(f'http://localhost:{port}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  terminal_data:
