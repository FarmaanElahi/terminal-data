x-terminal-env: &terminal-env
  DB_SCHEME: ${DB_SCHEME:-postgresql}
  DB_DRIVER: ${DB_DRIVER:-psycopg}
  DB_HOST: db
  DB_PORT: 5432
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-postgres}
  DB_NAME: ${DB_NAME:-terminal}
  SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY}
  ENVIRONMENT: ${ENVIRONMENT:-production}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: ${LOG_FORMAT:-json}
  PORT: ${PORT:-8000}
  ALGORITHM: ${ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
  MIN_PASSWORD_LENGTH: ${MIN_PASSWORD_LENGTH:-8}
  ALERT_WEBOOK_URL: ${ALERT_WEBOOK_URL:-}
  OCI_BUCKET: ${OCI_BUCKET:?Set OCI_BUCKET}
  OCI_CONFIG: ${OCI_CONFIG:?Set OCI_CONFIG}
  OCI_KEY: ${OCI_KEY:?Set OCI_KEY}
  UPSTOX_ACCESS_TOKEN: ${UPSTOX_ACCESS_TOKEN:-}
  UPSTOX_API_KEY: ${UPSTOX_API_KEY:-}
  UPSTOX_API_SECRET: ${UPSTOX_API_SECRET:-}
  UPSTOX_REDIRECT_URI: ${UPSTOX_REDIRECT_URI:-}
  KITE_API_KEY: ${KITE_API_KEY:-}
  KITE_API_SECRET: ${KITE_API_SECRET:-}
  KITE_REDIRECT_URI: ${KITE_REDIRECT_URI:-}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
  VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
  VAPID_CLAIMS_EMAIL: ${VAPID_CLAIMS_EMAIL:-}

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-terminal}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-terminal}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - terminal_pg:/var/lib/postgresql/data

  app:
    image: devfarmaan/terminal:main
    depends_on:
      - db
    environment:
      <<: *terminal-env
    command:
      [
        "sh",
        "-lc",
        "/app/.venv/bin/python -m terminal.cli database upgrade head && exec /app/.venv/bin/uvicorn terminal.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1",
      ]
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - terminal_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, os; port=os.getenv('PORT', '8000'); urllib.request.urlopen(f'http://localhost:{port}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  terminal_data:
    name: terminal_data
  terminal_pg:
    name: terminal_pg
