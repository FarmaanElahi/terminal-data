x-terminal-env: &terminal-env
  DB_SCHEME: ${DB_SCHEME:-postgresql}
  DB_DRIVER: ${DB_DRIVER:-psycopg}
  DB_HOST: ${DB_HOST:-database}
  DB_PORT: ${DB_PORT:-5432}
  DB_USER: ${SERVICE_USER_POSTGRES}
  DB_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
  DB_NAME: ${DB_NAME:-terminal}
  SECRET_KEY: ${SERVICE_PASSWORD_64_SECRETKEY}
  ENCRYPTION_KEY: ${SERVICE_BASE64_64_ENCRYPTION}
  BASE_URL: ${SERVICE_URL_APP}
  ENVIRONMENT: ${ENVIRONMENT:-production}
  LOG_LEVEL: ${LOG_LEVEL:-INFO} 
  LOG_FORMAT: ${LOG_FORMAT:-json}
  PORT: ${PORT:-8000}
  ALGORITHM: ${ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
  MIN_PASSWORD_LENGTH: ${MIN_PASSWORD_LENGTH:-8}
  OCI_BUCKET: ${OCI_BUCKET}
  OCI_CONFIG: ${OCI_CONFIG}
  OCI_KEY: ${OCI_KEY}
  UPSTOX_ACCESS_TOKEN: ${UPSTOX_ACCESS_TOKEN}
  UPSTOX_API_KEY: ${UPSTOX_API_KEY}
  UPSTOX_API_SECRET: ${UPSTOX_API_SECRET}
  UPSTOX_REDIRECT_URI: ${UPSTOX_REDIRECT_URI:-${SERVICE_URL_APP}/broker/upstox/callback}
  KITE_API_KEY: ${KITE_API_KEY}
  KITE_API_SECRET: ${KITE_API_SECRET}
  KITE_REDIRECT_URI: ${KITE_REDIRECT_URI:-${SERVICE_URL_APP}/broker/kite/callback}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
  VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
  VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
  VAPID_CLAIMS_EMAIL: ${VAPID_CLAIMS_EMAIL}

services:
  database:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SERVICE_USER_POSTGRES}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: ${DB_NAME:-terminal}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DB_NAME:-terminal}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - terminal_pg:/var/lib/postgresql/data
    labels:
      - coolify.managed=true

  app:
    image: devfarmaan/terminal:main
    depends_on:
      - database
    environment:
      <<: *terminal-env
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - terminal_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${PORT:-8000}/health > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - coolify.managed=true
      - traefik.enable=true
      - "traefik.http.routers.terminal-http.rule=Host(`${SERVICE_FQDN_APP:-localhost}`)"
      - "traefik.http.routers.terminal-http.entryPoints=http"
      - "traefik.http.routers.terminal-https.rule=Host(`${SERVICE_FQDN_APP:-localhost}`)"
      - "traefik.http.routers.terminal-https.entryPoints=https"
      - "traefik.http.routers.terminal-https.tls=true"
      - "traefik.http.services.terminal.loadbalancer.server.port=${PORT:-8000}"

volumes:
  terminal_data:
    name: terminal_data
  terminal_pg:
    name: terminal_pg
