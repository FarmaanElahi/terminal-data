services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
      target: dev-builder
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ..:/app:cached
      - web_node_modules:/app/src/web/node_modules
    ports:
      - "5173:5173"
      - "8000:8000"
    environment:
      - DB_SCHEME=postgresql
      - DB_DRIVER=psycopg
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=terminal
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - LOG_FORMAT=text
      - PYTHONPATH=/app/src
    env_file:
      - .env
    command: sleep infinity # Kept alive by devcontainer

  db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: terminal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
  web_node_modules:
