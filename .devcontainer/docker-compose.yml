services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ..:/app:cached
      - py_venv:/app/.venv
      - web_node_modules:/app/src/web/node_modules
    ports:
      - "5173:5173"
      - "6699:6699"
    environment:
      PYTHONPATH: /app/src
    command: sleep infinity # Kept alive by devcontainer

  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terminal"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  py_venv:
  web_node_modules:
